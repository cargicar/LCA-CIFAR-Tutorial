data:
  image_glob: "cifar-10-images/*/*.png"   # local CIFAR-10 PNGs
  batch_size: 64
  num_workers: 4

model:
  features: 64                # number of dictionary atoms
  in_channels: 3              # RGB
  kernel_size: 9              # spatial size of each atom (9x9)
  stride: 2
  lambda_: 0.05               # LCA firing threshold
  tau: 100                    # LCA time constant
  lca_iters: 800              # ODE steps per forward pass
  learning_rate: 0.01         # eta for built-in Hebbian weight update

training:
  epochs: 25
  lambda_anneal_every: 4      # increase lambda_ by lambda_anneal_step every N epochs
  lambda_anneal_step: 0.1
  print_freq: 20              # print metrics every N batches
  dtype: "float16"            # "float16" (faster on GPU) or "float32"

output:
  n_images: 4                 # images to show in reconstruction plot
